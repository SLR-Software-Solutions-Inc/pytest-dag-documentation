site_name: pytest-dag
site_description: Dependency-aware DAG execution for pytest
site_url: https://pytest-dag.readthedocs.io/en/latest/
repo_url: https://github.com/SLR-Software-Solutions-Inc/pytest-dag-documentation
repo_name: SLR-Software-Solutions-Inc/pytest-dag-documentation

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - content.code.copy

nav:
  - Overview: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Comparison: comparison.md
  - License Validation: license-validation.md
  - Troubleshooting: troubleshooting.md
  - Read the Docs (Separate Repo): readthedocs-separate-repo.md

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight

plugins:
  - search
